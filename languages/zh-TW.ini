AboutApp = [相容性]\r\n 1 = 適用於 Win11、10、8.1、8、7、Vista \r\n 2 = 支援 64 位元、32 位元 CPU 作業系統\r\n 3 = 適配高解析度螢幕，最佳縮放比例為 150%\r\n\r\n[程式碼開源]\r\n 1 = 程式語言：C#，Winform 程式，MIT 開源授權\r\n 2 = GitHub 專案：https://github.com/Jack251970/ContextMenuManager \r\n 3 = Gitee 專案：https://gitee.com/Jack251970/ContextMenuManager \r\n\r\n[注意事項]\r\n 1 = 程式需要對大量的登錄檔項與檔案進行讀取、寫入、刪除及修改，這些行為較為敏感，\r\n 可能會被 Windows Defender 等防毒軟體誤判為病毒，若發生此情況請自行將其加入白名單。\r\n\r\n 2 = 某些特殊選單項目可能會受到其他因素影響，導致不會直接顯示在右鍵選單中，\r\n    但是按照程式使用的通用規則，在此程式中仍會顯示為啟用狀態，這是正常現象。\r\n\r\n 3 = 每個右鍵管理程式的停用方法可能不同，建議不要同時使用多個右鍵選單管理工具，\r\n 大部分程式使用簡單粗暴的「備份-刪除法」，此程式儘可能使用了系統提供的機碼值進行隱藏，\r\n 透過其他程式停用的選單項目，請先使用該對應程式還原，否則可能無法在此程式中看到它。\r\n\r\n 4 = 此程式並非用於清理未解除安裝乾淨的軟體，但可幫助您定位選單項目相關的登錄檔與檔案路徑，\r\n 您可以根據相關內容進行操作。如果您是電腦新手，建議僅操作「啟用／停用」開關即可。

Dictionaries = [字典說明]\r\n 此程式擁有數個字典檔案，每份字典又分為使用者字典（User 目錄）與網路字典（Web 目錄）\r\n 如果想為此程式新增字典，可點擊右鍵將檔案儲存至 User 目錄，並依照檔案內的說明進行新增\r\n 您可以將您的字典傳送到我的信箱或是提交合併請求到 GitHub 為此專案做出貢獻\n 右側索引標籤中為原始字典內容，您可以切換標籤進行查看、右鍵編輯及儲存操作\r\n\r\n[字典內容]\r\n 1 = 程式顯示文字語言字典（Languages 目錄）\r\n 2 = ShellEx 選單項 GUID 文字圖示字典（GuidInfosDic.ini）\r\n 3 = 系統與其他程式內部部分選單詳細設定規則字典（DetailedEditDic.xml）\r\n 4 = 增強選單項目字典（EnhanceMenusDic.xml）\r\n 5 = UWP 新模組字典（UWPModeItemsDic.xml）

Donate = 此程式完全免費，如果您覺得這款軟體對您有所幫助，您可以透過掃描\r\n下方 QR Code（微信、支付寶、騰訊 QQ）進行贊助，金額隨意，感謝您的支持！\r\n也期待您能在 GitHub 或 Gitee 上為此專案點亮 Star（這對我非常重要！）。

