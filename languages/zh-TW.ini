;此檔案為 ContextMenuManager Windows 右鍵選單管理程式 的顯示文字字典
;翻譯：可幫助作者為此程式提供翻譯並提交到 Github，以下內容中等號右側內容取代為翻譯文字
;General-Translator 為翻譯貢獻者，General-Language 為語言名稱，如 zh-TW 台灣繁體中文
;翻譯檔案儲存在 Config\languages 資料夾中，檔案名稱儲存為 zh-TW.ini
;翻譯說明：暫時不翻譯的值保留為空即可，字典內賦值換行使用 \r\n 或 \n 進行逸出
;若翻譯貢獻者為多人時，請在 Translator 與對應的 TranslatorUrl 數值中使用 \r\n 或 \n 進行換行。
;若沒有網址，請將數值設為 null，並確保貢獻者與連結一一對應。例如：Translator = Bob \r\n Join \r\n Andi
;TranslatorUrl = https://github.com/BluePointLilac \r\n null \r\n https://gitee.com/BluePointLilac

